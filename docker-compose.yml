services:
  db:
    image: postgres:16
    container_name: ai-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
  bot:
    build: .

    restart: always

    env_file:
      - .env

    depends_on:
      - db
  api:
    build: .
    command: uv run uvicorn api.main:app --host 127.0.0.1 --port 8000
